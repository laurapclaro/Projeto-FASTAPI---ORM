<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-widht, initial-scale=1.0">
    <title>Sistema de Produtos</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f5f6fa;
        }

        header {
            background-color: #2f3640;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 22px;
        }

        .container {
            width: 90%;
            max-width: 900px;
            margin: 30px auto;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0984e3;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background-color: #0984e3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0652DD;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: #777;
        }
    </style>
</head>
<body>

<header>
    Sistema de Cadastro de Produtos
</header>

<div class="container">
    <div class="card">
        <h2>Cadastrar Produto</h2>

        <form action="/produtos" method="POST">

            <div class="form-group">
                <label>Nome do Produto</label>
                <input type="text" name="nome" placeholder="Digite o nome..." required>
            </div>

            <div class="form-group">
                <label>Preço</label>
                <input type="number" step="0.01" name="preco" placeholder="Ex: 19.99" required>
            </div>

            <div class="form-group">
                <label>Estoque</label>
                <input type="number" name="estoque" placeholder="Quantidade" required>
            </div>

            <div class="form-group">
                <label>Categoria</label>
                <select name="categoria_id">
                    <option value="">Selecione</option>
                    <option value="1">Eletrônicos</option>
                    <option value="2">Roupas</option>
                    <option value="3">Alimentos</option>
                </select>
            </div>

            <button type="submit">Cadastrar Produto</button>

        </form>
    </div>
</div>

<footer>
    © 2026 - Sistema Loja
</footer>

</body>
</html>

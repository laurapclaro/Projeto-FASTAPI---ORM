<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Categoria</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        header {
            background: #111827;
            padding: 18px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
        }

        .container {
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .card {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: #0f172a;
            color: white;
        }

        input:focus {
            outline: 2px solid #3b82f6;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .back {
            display: block;
            margin-top: 15px;
            text-align: center;
            color: #94a3b8;
            text-decoration: none;
        }

        .back:hover {
            color: white;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #cbd5e1;
        }
    </style>
</head>

<body>

<header>
    🗂️ Cadastro de Categoria
</header>

<div class="container">
    <div class="card">

        <h2>Nova Categoria</h2>

        <form action="/categorias/cadastro" method="post">

            <label>Nome da Categoria</label>
            <input type="text" name="nome" placeholder="Ex: Eletrônicos" required>

            <label>Descrição</label>
            <input type="text" name="descricao" placeholder="Ex: Produtos eletrônicos em geral">

            <div class="checkbox">
                <input type="checkbox" name="status" value="true">
                <label>Categoria ativa</label>
            </div>

            <button type="submit">Salvar Categoria</button>

        </form>

        <a class="back" href="/">← Voltar ao painel</a>

    </div>
</div>

</body>
</html>
